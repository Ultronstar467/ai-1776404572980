<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #1a202c;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: calc(100% - 24px); /* Account for padding */
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #4c51bf;
            box-shadow: 0 0 0 2px rgba(76, 81, 191, 0.2);
        }

        button {
            width: 100%;
            padding: 12px 20px;
            background-color: #4c51bf;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5a61d1;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 14px;
            color: #4a5568;
        }

        .toggle-link a {
            color: #4c51bf;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .toggle-link a:hover {
            color: #5a61d1;
            text-decoration: underline;
        }

        #protected-content {
            display: none; /* Hidden by default */
            margin-top: 30px;
            padding: 30px;
            background-color: #e0f2f7;
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        #protected-content h2 {
            color: #2a6190;
        }

        #protected-content p {
            font-size: 16px;
            line-height: 1.6;
            color: #4a5568;
        }

        #protected-content button {
            background-color: #e53e3e;
            margin-top: 20px;
        }

        #protected-content button:hover {
            background-color: #ef4444;
        }

        #protected-content button:active {
            background-color: #c53030;
        }

    </style>
</head>
<body>
    <div class="container">
        <div id="auth-form">
            <h2 id="form-title">Login</h2>
            <form id="auth-submit-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group" id="email-group" style="display: none;">
                    <label for="email">Email (Optional):</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group" id="fullname-group" style="display: none;">
                    <label for="fullname">Full Name (Optional):</label>
                    <input type="text" id="fullname" name="full_name">
                </div>
                <button type="submit" id="submit-button">Login</button>
            </form>
            <div id="message" class="message" style="display: none;"></div>
            <div class="toggle-link">
                <span id="toggle-text">Don't have an account? </span><a href="#" id="toggle-auth-mode">Register</a>
            </div>
        </div>

        <div id="protected-content">
            <h2>Welcome!</h2>
            <p><strong>Username:</strong> <span id="display-username"></span></p>
            <p><strong>Email:</strong> <span id="display-email"></span></p>
            <p><strong>Full Name:</strong> <span id="display-fullname"></span></p>
            <button id="logout-button">Logout</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000"; // Ensure this matches your FastAPI server address

        const authFormDiv = document.getElementById('auth-form');
        const protectedContentDiv = document.getElementById('protected-content');
        const formTitle = document.getElementById('form-title');
        const authSubmitForm = document.getElementById('auth-submit-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const emailInput = document.getElementById('email');
        const fullnameInput = document.getElementById('fullname');
        const emailGroup = document.getElementById('email-group');
        const fullnameGroup = document.getElementById('fullname-group');
        const submitButton = document.getElementById('submit-button');
        const messageDiv = document.getElementById('message');
        const toggleAuthModeLink = document.getElementById('toggle-auth-mode');
        const toggleText = document.getElementById('toggle-text');
        const logoutButton = document.getElementById('logout-button');

        const displayUsername = document.getElementById('display-username');
        const displayEmail = document.getElementById('display-email');
        const displayFullname = document.getElementById('display-fullname');

        let isRegisterMode = false;

        function displayMessage(message, type) {
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.textContent = '';
            }, 5000); // Hide message after 5 seconds
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            if (isRegisterMode) {
                formTitle.textContent = 'Register';
                submitButton.textContent = 'Register';
                toggleText.textContent = 'Already have an account? ';
                toggleAuthModeLink.textContent = 'Login';
                emailGroup.style.display = 'block';
                fullnameGroup.style.display = 'block';
            } else {
                formTitle.textContent = 'Login';
                submitButton.textContent = 'Login';
                toggleText.textContent = 'Don\'t have an account? ';
                toggleAuthModeLink.textContent = 'Register';
                emailGroup.style.display = 'none';
                fullnameGroup.style.display = 'none';
            }
            messageDiv.style.display = 'none'; // Clear previous messages
            usernameInput.value = '';
            passwordInput.value = '';
            emailInput.value = '';
            fullnameInput.value = '';
        }

        async function handleAuth(event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const email = emailInput.value.trim();
            const full_name = fullnameInput.value.trim();

            if (!username || !password) {
                displayMessage('Username and password are required!', 'error');
                return;
            }

            let endpoint = '';
            let method = 'POST';
            let headers = {
                'Content-Type': 'application/json'
            };
            let body = {};

            if (isRegisterMode) {
                endpoint = '/register';
                body = { username, password, email, full_name };
            } else {
                endpoint = '/login';
                // For FastAPI's OAuth2PasswordRequestForm, it expects x-www-form-urlencoded
                // So we send it as FormData, fetch will handle the content-type automatically
                // Or explicitly set 'Content-Type': 'application/x-www-form-urlencoded' and use URLSearchParams
                headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
                body = new URLSearchParams({ username, password });
            }

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: method,
                    headers: headers,
                    body: isRegisterMode ? JSON.stringify(body) : body.toString()
                });

                const data = await response.json();

                if (response.ok) {
                    if (isRegisterMode) {
                        displayMessage('Registration successful! You can now log in.', 'success');
                        toggleAuthMode(); // Switch to login mode
                    } else { // Login successful
                        localStorage.setItem('access_token', data.access_token);
                        displayMessage('Login successful!', 'success');
                        await fetchUserDetails(); // Fetch user details and show protected content
                    }
                } else {
                    displayMessage(data.detail || 'An error occurred.', 'error');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                displayMessage('Network error. Please try again.', 'error');
            }
        }

        async function fetchUserDetails() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                authFormDiv.style.display = 'block';
                protectedContentDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/users/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    displayUsername.textContent = user.username;
                    displayEmail.textContent = user.email || 'N/A';
                    displayFullname.textContent = user.full_name || 'N/A';
                    authFormDiv.style.display = 'none';
                    protectedContentDiv.style.display = 'block';
                    displayMessage(`Welcome, ${user.username}!`, 'success');
                } else {
                    // Token expired or invalid
                    localStorage.removeItem('access_token');
                    authFormDiv.style.display = 'block';
                    protectedContentDiv.style.display = 'none';
                    const errorData = await response.json();
                    displayMessage(errorData.detail || 'Session expired. Please log in again.', 'error');
                }
            } catch (error) {
                console.error('Error fetching user details:', error);
                localStorage.removeItem('access_token'); // Clear token on network error
                authFormDiv.style.display = 'block';
                protectedContentDiv.style.display = 'none';
                displayMessage('Network error. Please try again.', 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('access_token');
            displayMessage('You have been logged out.', 'success');
            toggleAuthMode(); // Reset form to login view
            fetchUserDetails(); // Will switch to login form
        }

        // Event Listeners
        authSubmitForm.addEventListener('submit', handleAuth);
        toggleAuthModeLink.addEventListener('click', (e) => {
            e.preventDefault();
            toggleAuthMode();
        });
        logoutButton.addEventListener('click', handleLogout);

        // On page load, check if there's an existing token
        document.addEventListener('DOMContentLoaded', fetchUserDetails);

    </script>
</body>
</html>
